services:
  edu-app:
    build: .
    ports:
      - 3000:3000
    restart: always
    environment:
      MONGO_DB_USERNAME: ${MONGO_ADMIN}
      MONGO_DB_PWD: ${MONGO_PASSWORD}
    networks:
      - edupro
    depends_on:
        - "edumongodb"
  edumongodb:
    image: mongo:4.4
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - edupro

  edumongo-express:
    image: mongo-express:0.54
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ADMIN}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: edumongodb
    depends_on:
      - "edumongodb"
    networks:
      - edupro
    restart: on-failure

networks:
  edupro:
    driver: bridge
